Root:
  Short: CLI tool for Niubility platform
  Long: |-
    Niubility CLI allows you to interact with Niubility platform from the command line.

    You can browse content, publish articles, manage categories, and more.

    Start by logging in:
      niubility login --server http://your-server:9000
  Flag:
    Config: config file (default is ~/.config/niubility/config.yaml)
    Profile: isolated profile name for multi-server login
    Output: output format (table or json)
    Language: language for CLI messages (en or zh-CN)
  Error:
    FailedLoadConfig: failed to load config
    ServerNotConfigured: server not configured. Run 'niubility login --server <url>' first
    InvalidTimeout: invalid timeout
    FailedCreateAuthManager: failed to create auth manager
    FailedCreateAPIClient: failed to create API client

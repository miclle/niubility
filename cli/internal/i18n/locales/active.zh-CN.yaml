Login:
  Short: 登录 Niubility 服务器
  Long: |-
    通过用户名/密码或 SSO 登录 Niubility 服务器。

    如果服务器启用了 SSO，在未显式提供用户名/密码参数时，
    默认会使用浏览器 SSO 登录。

    示例：
      # 交互式登录
      niubility login

      # 指定服务器
      niubility login --server http://localhost:9000

      # 使用 SSO 登录
      niubility login --server http://localhost:9000 --sso

      # 非交互式登录
      niubility login --server http://localhost:9000 --username admin --password-stdin < password.txt
  Flag:
    Server: Niubility 服务器地址
    Username: 用户名
    Password: 密码（非交互场景请使用 --password-stdin）
    PasswordStdin: 从标准输入读取密码
    SSO: 使用浏览器 SSO 登录
  Error:
    ServerRequired: 必须提供服务器地址，请使用 --server 或在配置中设置
    SSOConflict: --sso 不能与用户名/密码参数同时使用
    SSOFailed: SSO 登录失败
    LoginFailed: 登录失败
    FailedSyncAuthToken: 同步认证令牌失败
    FailedSaveConfig: 保存配置失败
    FailedVerifyLogin: 校验登录状态失败
    FailedReadUsername: 读取用户名失败
    FailedReadPassword: 读取密码失败
    CredentialsRequired: 用户名和密码不能为空
  Success:
    LoggedInAs: 已登录为 {{.Name}}
WhoAmI:
  Short: 显示当前登录用户
  Long: |-
    显示当前登录用户的信息。

    该命令会调用 boot 接口校验认证状态，
    并展示当前用户信息。
  Error:
    FailedGetBootInfo: 获取 boot 信息失败
  Output:
    LoggedInAs: 当前登录用户
Logout:
  Short: 从 Niubility 服务器登出
  Long: |-
    从 Niubility 服务器登出并清除本地会话。

    该命令会清理本地会话，并在可能时调用服务端登出接口，
    使服务端会话失效。
  Error:
    ServerLogoutFailed: 服务端登出失败
    FailedClearSession: 清除本地会话失败
    FailedSaveConfig: 保存配置失败
  Success:
    LoggedOut: 已登出
Category:

Content:
  Short: 管理内容
  Long: |-
    管理 Niubility 平台上的内容。

    内容类型：article、gallery、video
    状态：draft、published
  Flag:
    Category: 按分类 slug 过滤
    Type: 按类型过滤（article/gallery/video）
    Status: 按状态过滤（draft/published）
    Keyword: 按关键词搜索
    Tag: 按标签过滤
    Sort: 排序方式
    AuthorID: 按作者 ID 过滤
  List:
    Short: 列出内容
    Long: 按条件列出内容。
    Empty: 没有找到内容
    Error:
      ListFailed: 获取内容列表失败
  View:
    Short: 查看内容详情
    Long: 查看单个内容的详细信息。
    Attachments: 附件（{{.Count}}）
    CoverSuffix: ' [封面]'
    Error:
      GetFailed: 获取内容失败
  Create:
    Short: 创建内容
    Long: |-
      从本地文件创建新内容。

      对文章类型，请提供包含 front-matter 的 Markdown 文件：
        ---
        title: My Article
        category: learning
        tags: [go, tutorial]
        status: draft
        cover: ./cover.png
        attachments:
          - ./slides.pdf
        ---

        Article content in Markdown...
    Flag:
      Status: 内容状态（draft/published）
    Success:
      Created: 内容创建成功
    Error:
      UnsupportedType: 当前版本仅支持 `article` 类型
      ParseFailed: 解析文件失败
      CategoriesFailed: 获取分类失败
      CategoryNotFound: 未找到分类 `{{.Slug}}`
      UploadFailed: 上传附件失败
      CreateFailed: 创建内容失败
  Edit:
    Short: 从 Markdown 文件更新内容
    Long: |-
      从 Markdown 文件更新已有内容。

      Markdown 文件支持与 `content create` 相同的 front-matter 格式。
      只有 front-matter 中出现的字段才会更新；未提供的字段保持不变。
    Flag:
      Status: 内容状态（draft/published）
    Success:
      Updated: 内容更新成功
    Error:
      ParseFailed: 解析文件失败
      CategoriesFailed: 获取分类失败
      CategoryNotFound: 未找到分类 `{{.Slug}}`
      UploadFailed: 上传附件失败
      UpdateFailed: 更新内容失败
  Delete:
    Short: 删除内容
    Long: 按 ID 删除内容。
    Prompt: '确认删除 “{{.Title}}” 吗？[y/N]:'
    Success:
      Deleted: 内容 {{.ID}} 已删除
    Error:
      GetFailed: 获取内容失败
      DeleteFailed: 删除内容失败

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify gofmt
        shell: bash
        run: |
          mapfile -t files < <(find . -type f -name '*.go' -not -path './internal/website/node_modules/*')
          if [ "${#files[@]}" -eq 0 ]; then
            exit 0
          fi
          unformatted="$(gofmt -l "${files[@]}")"
          if [ -n "$unformatted" ]; then
            echo "The following Go files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Verify root Go modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet backend
        run: go vet ./...

      - name: Test backend
        run: go test -trimpath ./...

  cli:
    name: CLI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            cli/go.sum

      - name: Verify CLI Go modules are tidy
        working-directory: cli
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Test CLI
        working-directory: cli
        run: go test -trimpath ./...

      - name: Build CLI
        working-directory: cli
        run: go build -trimpath .

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: internal/website/package-lock.json

      - name: Install frontend dependencies
        working-directory: internal/website
        run: npm ci

      - name: Lint frontend
        working-directory: internal/website
        run: npm run lint

      - name: Build frontend
        working-directory: internal/website
        run: npm run build

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs:
      - backend
      - cli
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            cli/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: internal/website/package-lock.json

      - name: Install frontend dependencies
        working-directory: internal/website
        run: npm ci

      - name: Build embedded web assets
        working-directory: internal/website
        run: npm run build

      - name: Build server binary
        run: |
          mkdir -p bin
          go build -trimpath -o bin/niubility ./cmd/niubility

      - name: Build CLI binary
        working-directory: cli
        run: |
          mkdir -p ../bin
          go build -trimpath -o ../bin/niubility-cli .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: niubility-build-${{ github.sha }}
          path: bin/

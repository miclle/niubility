version: "3"

vars:
  WEBSITE_DIR: website
  CLI_DIR: cli
  BIN_DIR: bin
  BUILD_PLATFORMS: linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64
  GIT_COMMIT:
    sh: git rev-parse --short HEAD
  BUILD_TIME:
    sh: TZ='Asia/Shanghai' date "+%Y-%m-%d-%H-%M-%S"
  LDFLAGS:
    "-s -w -X 'main.CommitID={{.GIT_COMMIT}}' -X 'main.BuildTime={{.BUILD_TIME}}'"

tasks:
  default:
    desc: Print task list
    cmds:
      - task --list-all --sort none
    silent: true

  init-config:
    internal: true
    cmds:
      - cp cmd/niubility/config.example.yaml cmd/niubility/config.local.yaml
      - echo "Created cmd/niubility/config.local.yaml from config.example.yaml"
    status:
      - test -f cmd/niubility/config.local.yaml

  install:
    desc: Install all dependencies (Go modules + frontend)
    cmds:
      - go mod download
      - cd {{.CLI_DIR}} && go mod download
      - cd {{.WEBSITE_DIR}} && npm install

  # ---------- Development ----------

  dev:
    desc: Start Vite dev server and Go server with hot-reload
    deps: [init-config, kill-vite]
    cmds:
      - |
        cd {{.WEBSITE_DIR}} && npm run dev &
        sleep 1
        reflex \
          -d none -s \
          -r '\.go$' \
          -R 'website/' \
          -R 'tmp' \
          -- go run -trimpath -tags development ./cmd/niubility/ -c cmd/niubility/config.local.yaml

  run:
    desc: Run the server (production mode, requires build first)
    deps: [init-config]
    cmds:
      - go run ./cmd/niubility/ -c cmd/niubility/config.local.yaml

  # ---------- Build ----------

  build:
    desc: Build the server binary for the current platform
    cmds:
      - cd {{.WEBSITE_DIR}} && npm install && npm run build
      - mkdir -p {{.BIN_DIR}}
      - |
        output="{{.BIN_DIR}}/niubility$(go env GOEXE)"
        echo "Building ${output}"
        CGO_ENABLED=0 \
          go build -trimpath -ldflags "{{.LDFLAGS}}" -o "$output" ./cmd/niubility/

  build-all:
    desc: Build server binaries for all supported platforms
    cmds:
      - cd {{.WEBSITE_DIR}} && npm install && npm run build
      - mkdir -p {{.BIN_DIR}}
      - |
        for platform in {{.BUILD_PLATFORMS}}; do
          GOOS_VALUE="${platform%/*}"
          GOARCH_VALUE="${platform#*/}"
          output="{{.BIN_DIR}}/niubility_${GOOS_VALUE}_${GOARCH_VALUE}"
          if [ "$GOOS_VALUE" = "windows" ]; then
            output="${output}.exe"
          fi
          echo "Building ${output}"
          CGO_ENABLED=0 GOOS="$GOOS_VALUE" GOARCH="$GOARCH_VALUE" \
            go build -trimpath -ldflags "{{.LDFLAGS}}" -o "$output" ./cmd/niubility/
        done

  build-cli:
    desc: Build the CLI binary for the current platform
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - |
        output="../{{.BIN_DIR}}/niubility-cli$(go env GOEXE)"
        echo "Building ${output#../}"
        cd {{.CLI_DIR}}
        CGO_ENABLED=0 \
          go build -trimpath -o "$output" .

  build-cli-all:
    desc: Build CLI binaries for all supported platforms
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - |
        for platform in {{.BUILD_PLATFORMS}}; do
          GOOS_VALUE="${platform%/*}"
          GOARCH_VALUE="${platform#*/}"
          output="../{{.BIN_DIR}}/niubility-cli_${GOOS_VALUE}_${GOARCH_VALUE}"
          if [ "$GOOS_VALUE" = "windows" ]; then
            output="${output}.exe"
          fi
          echo "Building ${output#../}"
          cd {{.CLI_DIR}}
          CGO_ENABLED=0 GOOS="$GOOS_VALUE" GOARCH="$GOARCH_VALUE" \
            go build -trimpath -o "$output" .
          cd - >/dev/null
        done

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
      - |
        go list ./... | grep -v '/website/node_modules/' | xargs go clean

  # ---------- Code Quality ----------

  lint:
    desc: Auto-fix code style (go mod tidy + gofmt + vet + staticcheck + frontend eslint)
    cmds:
      - go mod tidy
      - gofmt -w .
      - |
        go list ./... | grep -v '/website/node_modules/' | xargs go vet
      - |
        go list ./... | grep -v '/website/node_modules/' | xargs staticcheck
      - cd cli && go mod tidy
      - cd {{.WEBSITE_DIR}} && npm run lint

  check:
    desc: Run all checks without modifying files (CI-friendly)
    cmds:
      - task: check-backend
      - task: check-cli-mod-tidy
      - task: check-cli
      - task: check-frontend-types
      - task: check-mod-tidy

  check-backend:
    internal: true
    cmds:
      - gofmt -l .
      - |
        go list ./... | grep -v '/website/node_modules/' | xargs go vet -tags development
      - |
        LINT_BIN=golangci-lint
        GOPATH_LINT="$(go env GOPATH)/bin/golangci-lint"
        if [ -x "$GOPATH_LINT" ] && "$GOPATH_LINT" --version | grep -q 'version 2\.'; then
          LINT_BIN="$GOPATH_LINT"
        fi
        MODULE="$(go list -m)"
        go list ./... | grep -v '/website/node_modules/' | sed "s#^${MODULE}#.#" | xargs "$LINT_BIN" run --build-tags=development

  check-cli-mod-tidy:
    internal: true
    cmds:
      - |
        cd cli
        cp go.mod go.mod.bak
        cp go.sum go.sum.bak
        go mod tidy
        MOD_CHANGES=$(diff go.mod go.mod.bak | wc -l)
        SUM_CHANGES=$(diff go.sum go.sum.bak | wc -l)
        mv go.mod.bak go.mod
        mv go.sum.bak go.sum
        if [ $MOD_CHANGES -ne 0 ] || [ $SUM_CHANGES -ne 0 ]; then
          echo "cli/go.mod or cli/go.sum is not tidy. Run 'task lint' to fix."
          exit 1
        fi

  check-cli:
    internal: true
    cmds:
      - |
        cd cli
        LINT_BIN=golangci-lint
        GOPATH_LINT="$(go env GOPATH)/bin/golangci-lint"
        if [ -x "$GOPATH_LINT" ] && "$GOPATH_LINT" --version | grep -q 'version 2\.'; then
          LINT_BIN="$GOPATH_LINT"
        fi
        "$LINT_BIN" run ./...
      - cd cli && go build -trimpath .

  check-frontend-types:
    internal: true
    cmds:
      - cd {{.WEBSITE_DIR}} && npx tsc -b

  check-mod-tidy:
    internal: true
    cmds:
      - |
        cp go.mod go.mod.bak
        cp go.sum go.sum.bak
        go mod tidy
        MOD_CHANGES=$(diff go.mod go.mod.bak | wc -l)
        SUM_CHANGES=$(diff go.sum go.sum.bak | wc -l)
        mv go.mod.bak go.mod
        mv go.sum.bak go.sum
        if [ $MOD_CHANGES -ne 0 ] || [ $SUM_CHANGES -ne 0 ]; then
          echo "go.mod or go.sum is not tidy. Run 'task lint' to fix."
          exit 1
        fi

  # ---------- Testing ----------

  test:
    desc: Run Go tests with race detection and coverage, then frontend tests
    cmds:
      - |
        go list ./... | grep -v '/website/node_modules/' | xargs go test -trimpath -race -coverprofile=coverage.out
      - cd {{.WEBSITE_DIR}} && npx vitest run

  # ---------- Internal ----------

  kill-vite:
    internal: true
    cmds:
      - |
        ps aux | grep "[n]pm run dev" | grep "website" | awk '{print $2}' | xargs kill -9 2>/dev/null || true
        sleep 1

  update-tools:
    desc: Install/update development tools (reflex, staticcheck, golangci-lint)
    run: once
    cmds:
      - which reflex > /dev/null 2>&1 || go install github.com/cespare/reflex@latest
      - which staticcheck > /dev/null 2>&1 || go install honnef.co/go/tools/cmd/staticcheck@latest
      - |
        GOBIN="$(go env GOPATH)/bin"
        mkdir -p "$GOBIN"
        if [ ! -x "$GOBIN/golangci-lint" ] || ! "$GOBIN/golangci-lint" --version | grep -q 'version 2\.'; then
          GOBIN="$GOBIN" GO111MODULE=on go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.0
        fi

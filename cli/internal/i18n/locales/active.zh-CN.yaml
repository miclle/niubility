Config:
  Command:
    Short: 管理本地 CLI 配置
    Long: |-
      管理当前机器上的本地 CLI 配置。

      可以用这个命令持久化默认 CLI 语言等偏好设置。
    Show:
      Short: 显示本地 CLI 配置
      Long: |-
        显示当前 profile 使用的本地 CLI 配置。

        Token 等敏感值不会被直接输出。
    SetLanguage:
      Short: 持久化默认 CLI 语言
      Long: |-
        将默认 CLI 语言写入本地配置文件。

        支持的值：
          en
          zh-CN

        示例：

    Long: 列出所有可用内容分类。
    Empty: 没有找到分类
    Error:
      ListFailed: 获取分类列表失败
  Create:
    Short: 创建分类（仅管理员）
    Long: 创建一个新的内容分类，需要管理员权限。
    Success:
      Created: 分类已创建
    Error:
      NameRequired: 必须提供 `--name`
      SlugRequired: 必须提供 `--slug`
      CreateFailed: 创建分类失败
  Update:
    Short: 更新分类（仅管理员）
    Long: 更新已有内容分类，仅修改显式传入的字段。
    Success:
      Updated: 分类已更新
    Error:
      UpdateFailed: 更新分类失败
  Delete:
    Short: 删除分类（仅管理员）
    Long: 按 ID 删除内容分类，需要管理员权限。
    Prompt: '确认删除分类 {{.ID}} 吗？[y/N]:'
